<!DOCTYPE html>
<html>
<head>
    <title>RAG Main.py - Query Test</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        @media (max-width: 1000px) {
            .content { grid-template-columns: 1fr; }
        }
        .panel {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9fafb;
        }
        .panel h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1em;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .results-container {
            margin-top: 20px;
        }
        .result-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .result-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        .result-score {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .result-text {
            color: #333;
            line-height: 1.6;
            margin: 10px 0;
            padding: 10px;
            background: #f5f5f5;
            border-left: 3px solid #667eea;
            border-radius: 2px;
            font-size: 0.95em;
        }
        .result-source {
            color: #666;
            font-size: 0.9em;
            margin-top: 8px;
        }
        .role-badge {
            display: inline-block;
            background: #e8eaf6;
            color: #667eea;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 10px;
        }
        .status-message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .status-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        .status-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }
        .status-warning {
            background: #fff3e0;
            color: #e65100;
            border-left: 4px solid #ff9800;
        }
        .status-loading {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
            margin-bottom: 15px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 RAG Query Test Console</h1>
            <p>Test the RAG workflow with vault-based masking and role-based access control</p>
        </div>

        <div class="content">
            <!-- Left Panel: Query Input -->
            <div class="panel">
                <h2>📝 Query Input</h2>
                
                <div class="form-group">
                    <label>Question:</label>
                    <textarea id="question" placeholder="Enter your query..." defaultValue="who came to Apollo Hospital for diabetes checkup"></textarea>
                </div>

                <div class="form-group">
                    <label>Authorization Token:</label>
                    <select id="auth_token">
                        <option value="">-- Select Role --</option>
                        <option value="analyst_token">Analyst (Masked)</option>
                        <option value="finance_token">Finance (Partial)</option>
                        <option value="manager_token">Manager (Partial)</option>
                        <option value="admin_token">Admin (Full Reveal)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="mask_pii" checked>
                        Mask PII
                    </label>
                </div>

                <button onclick="sendQuery()" style="width: 100%; padding: 14px;">🚀 Send Query</button>

                <button onclick="syncPinecone()" style="width: 100%; padding: 10px; margin-top: 10px; background: #2196f3;">🔄 Sync Pinecone Data</button>

                <button onclick="loadDemoData()" style="width: 100%; padding: 10px; margin-top: 10px; background: #4caf50;">📥 Load Demo Data</button>

                <div style="margin-top: 30px; padding: 20px; background: #e8f5e9; border-radius: 6px; color: #2e7d32;">
                    <strong>📊 RAG Index Status</strong>
                    <p id="index_status">Loading...</p>
                </div>
            </div>

            <!-- Right Panel: Results -->
            <div class="panel">
                <h2>📊 Query Results</h2>

                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('results')">Results</button>
                    <button class="tab-btn" onclick="switchTab('raw')">Raw JSON</button>
                    <button class="tab-btn" onclick="switchTab('debug')">Debug Info</button>
                </div>

                <div id="results" class="tab-content active">
                    <div id="results-container" class="results-container">
                        <div class="empty-state">
                            <p>Results will appear here...</p>
                        </div>
                    </div>
                </div>

                <div id="raw" class="tab-content">
                    <pre id="raw-json" style="background: #f5f5f5; padding: 15px; border-radius: 6px; overflow-x: auto; max-height: 600px;"></pre>
                </div>

                <div id="debug" class="tab-content">
                    <pre id="debug-info" style="background: #f5f5f5; padding: 15px; border-radius: 6px; overflow-x: auto; max-height: 600px; font-size: 0.9em;"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check RAG index status on load
        window.onload = checkIndexStatus;

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function checkIndexStatus() {
            try {
                const response = await fetch('/api/index-status');
                const data = await response.json();
                document.getElementById('index_status').innerHTML = `
                    <strong>Chunks:</strong> ${data.total_chunks}<br>
                    <strong>Status:</strong> ${data.total_chunks > 0 ? '✅ Data loaded' : '⚠️ Empty (click "Sync Pinecone Data" or "Load Demo Data")'}
                `;
            } catch (error) {
                document.getElementById('index_status').innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
        }

        async function syncPinecone() {
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<div class="status-message status-loading"><span class="spinner"></span>Syncing Pinecone data into RAG index...</div>';

            try {
                const response = await fetch('/api/sync-pinecone-to-rag', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'success') {
                    resultsContainer.innerHTML = `
                        <div class="status-message status-success">
                            ✅ ${data.message}<br>
                            Total chunks now: ${data.total_chunks}
                        </div>
                    `;
                    checkIndexStatus();
                } else {
                    resultsContainer.innerHTML = `
                        <div class="status-message status-error">
                            ❌ Sync failed: ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                resultsContainer.innerHTML = `
                    <div class="status-message status-error">
                        ❌ Sync error: ${error.message}
                    </div>
                `;
            }
        }

        async function loadDemoData() {
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<div class="status-message status-loading"><span class="spinner"></span>Loading demo documents...</div>';

            try {
                const response = await fetch('/api/load-demo-data', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'success') {
                    resultsContainer.innerHTML = `
                        <div class="status-message status-success">
                            ✅ ${data.message}<br>
                            Total chunks now: ${data.total_chunks}
                        </div>
                    `;
                    checkIndexStatus();
                } else {
                    resultsContainer.innerHTML = `
                        <div class="status-message status-error">
                            ❌ Load failed: ${data.error}
                        </div>
                    `;
                }
            } catch (error) {
                resultsContainer.innerHTML = `
                    <div class="status-message status-error">
                        ❌ Load error: ${error.message}
                    </div>
                `;
            }
        }

        async function sendQuery() {
            const question = document.getElementById('question').value;
            const auth_token = document.getElementById('auth_token').value;
            const mask_pii = document.getElementById('mask_pii').checked;

            if (!auth_token) {
                alert('Please select a role');
                return;
            }

            if (!question.trim()) {
                alert('Please enter a question');
                return;
            }

            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<div class="status-message status-loading"><span class="spinner"></span>Processing query...</div>';

            try {
                const params = new URLSearchParams({
                    question,
                    authorization: auth_token,
                    mask_pii: mask_pii
                });

                const response = await fetch(`/query?${params}`);
                const data = await response.json();

                // Display raw JSON
                document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);

                // Display debug info
                document.getElementById('debug-info').textContent = JSON.stringify({
                    timestamp: new Date().toISOString(),
                    auth_token,
                    mask_pii,
                    retrieved_count: data.retrieved ? data.retrieved.length : 0,
                    http_status: response.status
                }, null, 2);

                // Display results
                let html = `<div class="status-message status-success">
                    ✅ Query successful! Retrieved ${data.retrieved.length} chunks
                </div>`;

                if (data.retrieved.length === 0) {
                    html += '<div class="empty-state"><p>No chunks returned from query</p></div>';
                } else {
                    data.retrieved.forEach((hit, i) => {
                        const meta = hit.meta || {};
                        const text = meta.text || meta.source_text || 'NO TEXT';
                        const source = meta.source || 'unknown';
                        const score = hit.score ? hit.score.toFixed(4) : 'N/A';

                        html += `
                        <div class="result-item">
                            <div>
                                <span class="result-score">Score: ${score}</span>
                                <span class="role-badge">${auth_token.replace('_token', '').toUpperCase()}</span>
                            </div>
                            <div class="result-text">${escapeHtml(text)}</div>
                            <div class="result-source">📄 Source: ${escapeHtml(source)}</div>
                        </div>
                        `;
                    });
                }

                resultsContainer.innerHTML = html;

            } catch (error) {
                resultsContainer.innerHTML = `
                    <div class="status-message status-error">
                        ❌ Query failed: ${error.message}
                    </div>
                `;
                document.getElementById('debug-info').textContent = error.stack;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
